<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop Companion</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
canvas { display: block; cursor: crosshair; }
#ui-overlay {
  position: fixed; top: 16px; left: 16px; z-index: 10;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: rgba(255,255,255,0.6); font-size: 13px;
  pointer-events: none; user-select: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  line-height: 1.6;
}
#mood-indicator {
  position: fixed; top: 16px; right: 16px; z-index: 10;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: rgba(255,255,255,0.5); font-size: 12px;
  text-align: right; pointer-events: none; user-select: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div id="ui-overlay">
  <div id="state-display">State: IDLE</div>
  <div id="fps-display">FPS: 60</div>
</div>
<div id="mood-indicator">
  <div id="mood-text">Mood: Content</div>
  <div id="hint-text" style="margin-top:4px;opacity:0.5;">Click on companion to interact</div>
</div>
<canvas id="canvas"></canvas>

<script>
// ============================================================
// DESKTOP COMPANION SIMULATION
// Complete canvas-based interactive character with FSM,
// procedural animation, IK limbs, and mouse interaction.
// ============================================================

'use strict';

// --- UTILITY FUNCTIONS ---
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeOutBack = t => { const c1 = 1.70158; const c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); };
const easeOutElastic = t => { if (t === 0 || t === 1) return t; return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI) / 3) + 1; };
const smoothstep = (edge0, edge1, x) => { const t = clamp((x - edge0) / (edge1 - edge0), 0, 1); return t * t * (3 - 2 * t); };
const randRange = (min, max) => Math.random() * (max - min) + min;

// ============================================================
// 1. RENDERING ENGINE
// ============================================================
class RenderingEngine {
  constructor() {
    this.canvas = document.getElementById('canvas');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.frameCount = 0;
    this.fps = 60;
    this.lastFpsUpdate = 0;
    this.fpsFrames = 0;
  }

  resize() {
    this.width = window.innerWidth;
    this.height = window.innerHeight;
    this.canvas.width = this.width;
    this.canvas.height = this.height;
    this.groundY = this.height * 0.82;
  }

  clear() {
    this.ctx.clearRect(0, 0, this.width, this.height);
  }

  updateFPS(time) {
    this.fpsFrames++;
    if (time - this.lastFpsUpdate >= 1000) {
      this.fps = this.fpsFrames;
      this.fpsFrames = 0;
      this.lastFpsUpdate = time;
      document.getElementById('fps-display').textContent = `FPS: ${this.fps}`;
    }
  }
}

// ============================================================
// 2. ROOM / WORLD SYSTEM
// ============================================================
class Room {
  constructor(renderer) {
    this.r = renderer;
    this.floorY = renderer.groundY;
    // Predefined positions (normalized 0-1 of screen width)
    this.positions = {
      desk:    { x: 0.65, label: 'Desk' },
      center:  { x: 0.45, label: 'Center' },
      window:  { x: 0.15, label: 'Window' },
      plant:   { x: 0.85, label: 'Plant' },
      doorway: { x: 0.05, label: 'Door' }
    };
    this.timeOfDay = 0; // 0-1 day cycle
    this.stars = [];
    for (let i = 0; i < 60; i++) {
      this.stars.push({
        x: Math.random(), y: Math.random() * 0.5,
        size: randRange(0.5, 2), twinkleSpeed: randRange(1, 4), twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }

  getWorldX(posName) {
    const pos = this.positions[posName];
    return pos ? pos.x * this.r.width : this.r.width * 0.5;
  }

  draw(time) {
    const ctx = this.r.ctx;
    const W = this.r.width;
    const H = this.r.height;
    const floorY = this.floorY;

    // --- Sky gradient (night atmosphere) ---
    const skyGrad = ctx.createLinearGradient(0, 0, 0, floorY);
    skyGrad.addColorStop(0, '#0f0c29');
    skyGrad.addColorStop(0.4, '#1a1a3e');
    skyGrad.addColorStop(1, '#24243e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, floorY);

    // Stars
    for (const s of this.stars) {
      const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * 0.001 * s.twinkleSpeed + s.twinkleOffset));
      ctx.globalAlpha = twinkle * 0.6;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * floorY, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Moon
    const moonX = W * 0.12;
    const moonY = H * 0.12;
    const moonGlow = ctx.createRadialGradient(moonX, moonY, 15, moonX, moonY, 100);
    moonGlow.addColorStop(0, 'rgba(200,210,255,0.15)');
    moonGlow.addColorStop(1, 'rgba(200,210,255,0)');
    ctx.fillStyle = moonGlow;
    ctx.fillRect(moonX - 100, moonY - 100, 200, 200);
    ctx.fillStyle = '#e8e8f0';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d0d0e0';
    ctx.beginPath();
    ctx.arc(moonX - 5, moonY - 4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(moonX + 7, moonY + 6, 3, 0, Math.PI * 2);
    ctx.fill();

    // --- Wall ---
    const wallGrad = ctx.createLinearGradient(0, floorY * 0.3, 0, floorY);
    wallGrad.addColorStop(0, '#1e1e3a');
    wallGrad.addColorStop(1, '#2a2a4a');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, floorY * 0.35, W, floorY * 0.65);

    // Baseboard
    ctx.fillStyle = '#3a3a5a';
    ctx.fillRect(0, floorY - 8, W, 8);

    // --- Window ---
    this.drawWindow(ctx, W * 0.15, floorY * 0.42, W * 0.14, floorY * 0.35, time);

    // --- Floor ---
    const floorGrad = ctx.createLinearGradient(0, floorY, 0, H);
    floorGrad.addColorStop(0, '#2d2d4f');
    floorGrad.addColorStop(1, '#1a1a35');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, floorY, W, H - floorY);

    // Floor reflection line
    ctx.strokeStyle = 'rgba(100,100,160,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, floorY);
    ctx.lineTo(W, floorY);
    ctx.stroke();

    // --- Desk ---
    this.drawDesk(ctx, W * 0.58, floorY, W * 0.3, time);

    // --- Bookshelf ---
    this.drawBookshelf(ctx, W * 0.88, floorY, time);

    // --- Plant ---
    this.drawPlant(ctx, W * 0.85, floorY, time);

    // --- Door ---
    this.drawDoor(ctx, W * 0.02, floorY);
  }

  drawWindow(ctx, x, y, w, h, time) {
    // Frame
    ctx.fillStyle = '#4a4a6a';
    ctx.fillRect(x - 4, y - 4, w + 8, h + 8);
    // Glass
    const glassGrad = ctx.createLinearGradient(x, y, x, y + h);
    glassGrad.addColorStop(0, '#1a1a40');
    glassGrad.addColorStop(1, '#2a2a50');
    ctx.fillStyle = glassGrad;
    ctx.fillRect(x, y, w, h);
    // Cross bars
    ctx.strokeStyle = '#5a5a7a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w / 2, y + h);
    ctx.moveTo(x, y + h / 2);
    ctx.lineTo(x + w, y + h / 2);
    ctx.stroke();
    // Moonlight glow through window
    const glowGrad = ctx.createRadialGradient(x + w / 2, y + h / 2, 0, x + w / 2, y + h / 2, w);
    glowGrad.addColorStop(0, 'rgba(150,160,220,0.08)');
    glowGrad.addColorStop(1, 'rgba(150,160,220,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(x - w, y - h / 2, w * 3, h * 2);
    // Curtains
    ctx.fillStyle = 'rgba(60,40,80,0.6)';
    const curtainSway = Math.sin(time * 0.0008) * 3;
    ctx.beginPath();
    ctx.moveTo(x - 8, y - 8);
    ctx.quadraticCurveTo(x + curtainSway, y + h * 0.5, x - 5, y + h + 15);
    ctx.lineTo(x - 15, y + h + 15);
    ctx.lineTo(x - 15, y - 8);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + w + 8, y - 8);
    ctx.quadraticCurveTo(x + w - curtainSway, y + h * 0.5, x + w + 5, y + h + 15);
    ctx.lineTo(x + w + 15, y + h + 15);
    ctx.lineTo(x + w + 15, y - 8);
    ctx.closePath();
    ctx.fill();
  }

  drawDesk(ctx, x, floorY, w, time) {
    const deskH = 70;
    const deskY = floorY - deskH;
    // Desk top
    ctx.fillStyle = '#5a4a3a';
    const topH = 8;
    ctx.beginPath();
    ctx.moveTo(x - 5, deskY);
    ctx.lineTo(x + w + 5, deskY);
    ctx.lineTo(x + w, deskY + topH);
    ctx.lineTo(x, deskY + topH);
    ctx.closePath();
    ctx.fill();
    // Desk surface highlight
    ctx.fillStyle = '#6a5a48';
    ctx.fillRect(x, deskY, w, topH - 2);
    // Legs
    ctx.fillStyle = '#4a3a2a';
    ctx.fillRect(x + 8, deskY + topH, 6, deskH - topH);
    ctx.fillRect(x + w - 14, deskY + topH, 6, deskH - topH);
    // Drawer
    ctx.fillStyle = '#5a4a3a';
    ctx.fillRect(x + w - 60, deskY + topH + 5, 50, 25);
    ctx.strokeStyle = '#6a5a48';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + w - 60, deskY + topH + 5, 50, 25);
    // Drawer knob
    ctx.fillStyle = '#8a7a68';
    ctx.beginPath();
    ctx.arc(x + w - 35, deskY + topH + 17, 3, 0, Math.PI * 2);
    ctx.fill();

    // Monitor on desk
    this.drawMonitor(ctx, x + w * 0.35, deskY, time);
    // Coffee mug
    this.drawMug(ctx, x + w * 0.75, deskY);
  }

  drawMonitor(ctx, x, deskY, time) {
    const mw = 70, mh = 50;
    const my = deskY - mh - 20;
    // Stand
    ctx.fillStyle = '#3a3a5a';
    ctx.fillRect(x - 3, deskY - 20, 6, 20);
    ctx.fillRect(x - 12, deskY - 4, 24, 4);
    // Screen bezel
    ctx.fillStyle = '#2a2a4a';
    ctx.beginPath();
    ctx.roundRect(x - mw / 2 - 4, my - 4, mw + 8, mh + 8, 4);
    ctx.fill();
    // Screen
    const screenGrad = ctx.createLinearGradient(x - mw / 2, my, x - mw / 2, my + mh);
    screenGrad.addColorStop(0, '#3a5a8a');
    screenGrad.addColorStop(1, '#2a4a7a');
    ctx.fillStyle = screenGrad;
    ctx.fillRect(x - mw / 2, my, mw, mh);
    // Screen content (fake code lines)
    ctx.globalAlpha = 0.4;
    const lineColors = ['#8be9fd', '#50fa7b', '#ff79c6', '#f1fa8c', '#bd93f9'];
    for (let i = 0; i < 7; i++) {
      const lw = 15 + Math.sin(i * 2.7 + time * 0.001) * 10 + 10;
      ctx.fillStyle = lineColors[i % lineColors.length];
      ctx.fillRect(x - mw / 2 + 6, my + 6 + i * 6, lw, 3);
    }
    ctx.globalAlpha = 1;
    // Screen glow
    const glow = ctx.createRadialGradient(x, my + mh / 2, 10, x, my + mh / 2, 80);
    glow.addColorStop(0, 'rgba(60,120,200,0.06)');
    glow.addColorStop(1, 'rgba(60,120,200,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(x - 80, my - 40, 160, mh + 80);
  }

  drawMug(ctx, x, deskY) {
    const mugH = 18, mugW = 14;
    ctx.fillStyle = '#d4a574';
    ctx.beginPath();
    ctx.moveTo(x - mugW / 2, deskY - mugH);
    ctx.quadraticCurveTo(x - mugW / 2 - 1, deskY, x - mugW / 2 + 2, deskY);
    ctx.lineTo(x + mugW / 2 - 2, deskY);
    ctx.quadraticCurveTo(x + mugW / 2 + 1, deskY, x + mugW / 2, deskY - mugH);
    ctx.closePath();
    ctx.fill();
    // Handle
    ctx.strokeStyle = '#d4a574';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(x + mugW / 2 + 4, deskY - mugH / 2, 5, -Math.PI * 0.4, Math.PI * 0.4);
    ctx.stroke();
  }

  drawBookshelf(ctx, x, floorY, time) {
    const sw = 60, sh = 130;
    const sy = floorY - sh;
    ctx.fillStyle = '#4a3a2a';
    ctx.fillRect(x, sy, sw, sh);
    // Shelves
    for (let i = 0; i < 4; i++) {
      const shelfY = sy + 8 + i * 32;
      ctx.fillStyle = '#5a4a38';
      ctx.fillRect(x - 2, shelfY, sw + 4, 4);
      // Books
      const bookColors = ['#c0392b', '#2980b9', '#27ae60', '#8e44ad', '#d4a574', '#e67e22'];
      let bx = x + 4;
      for (let j = 0; j < 4 + Math.floor(Math.sin(i * 3) * 1 + 1); j++) {
        const bw = randRange(6, 11) | 0;
        const bh = 24 + (Math.sin(i + j) * 4);
        ctx.fillStyle = bookColors[(i * 3 + j) % bookColors.length];
        ctx.fillRect(bx, shelfY - bh, bw, bh);
        bx += bw + 1;
        if (bx > x + sw - 8) break;
      }
    }
  }

  drawPlant(ctx, x, floorY, time) {
    // Pot
    ctx.fillStyle = '#8a5a3a';
    ctx.beginPath();
    ctx.moveTo(x - 14, floorY - 30);
    ctx.lineTo(x - 10, floorY);
    ctx.lineTo(x + 10, floorY);
    ctx.lineTo(x + 14, floorY - 30);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#6a4a2a';
    ctx.beginPath();
    ctx.ellipse(x, floorY - 30, 15, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Dirt
    ctx.fillStyle = '#4a3020';
    ctx.beginPath();
    ctx.ellipse(x, floorY - 30, 13, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Leaves
    const sway = Math.sin(time * 0.001) * 0.05;
    ctx.fillStyle = '#2ecc71';
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2 + sway * (i + 1);
      const lx = x + Math.cos(angle) * 12;
      const ly = floorY - 40 - Math.abs(Math.sin(angle)) * 15;
      ctx.beginPath();
      ctx.ellipse(lx, ly, 8, 14, angle + Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
    }
    // Stem
    ctx.strokeStyle = '#27ae60';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, floorY - 30);
    ctx.quadraticCurveTo(x + sway * 40, floorY - 50, x, floorY - 55);
    ctx.stroke();
  }

  drawDoor(ctx, x, floorY) {
    const dw = 50, dh = 110;
    ctx.fillStyle = '#3a3020';
    ctx.beginPath();
    ctx.roundRect(x, floorY - dh, dw, dh, [8, 8, 0, 0]);
    ctx.fill();
    ctx.strokeStyle = '#4a4030';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(x, floorY - dh, dw, dh, [8, 8, 0, 0]);
    ctx.stroke();
    // Panels
    ctx.strokeStyle = '#4a4030';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 6, floorY - dh + 10, dw - 12, 35);
    ctx.strokeRect(x + 6, floorY - dh + 55, dw - 12, 40);
    // Knob
    ctx.fillStyle = '#c0a060';
    ctx.beginPath();
    ctx.arc(x + dw - 12, floorY - dh / 2, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// 3. CHARACTER SYSTEM (Vector-based with bezier curves)
// ============================================================
class Limb {
  constructor(length1, length2) {
    this.length1 = length1;
    this.length2 = length2;
    this.jointX = 0;
    this.jointY = 0;
    this.endX = 0;
    this.endY = 0;
    this.angle1 = 0;
    this.angle2 = 0;
  }

  /** Simple 2-bone IK solve */
  solve(startX, startY, targetX, targetY, bendDir = 1) {
    const dx = targetX - startX;
    const dy = targetY - startY;
    const dist = Math.hypot(dx, dy);
    const l1 = this.length1;
    const l2 = this.length2;
    const maxReach = l1 + l2 - 1;

    let clampedDist = Math.min(dist, maxReach);
    if (clampedDist < Math.abs(l1 - l2) + 1) clampedDist = Math.abs(l1 - l2) + 1;

    const angle = Math.atan2(dy, dx);

    // Law of cosines
    let cosAngle1 = (l1 * l1 + clampedDist * clampedDist - l2 * l2) / (2 * l1 * clampedDist);
    cosAngle1 = clamp(cosAngle1, -1, 1);
    const a1 = angle - bendDir * Math.acos(cosAngle1);

    this.jointX = startX + Math.cos(a1) * l1;
    this.jointY = startY + Math.sin(a1) * l1;

    const a2 = Math.atan2(targetY - this.jointY, targetX - this.jointX);
    this.endX = this.jointX + Math.cos(a2) * l2;
    this.endY = this.jointY + Math.sin(a2) * l2;

    this.angle1 = a1;
    this.angle2 = a2;
  }
}

class Character {
  constructor(renderer) {
    this.r = renderer;
    // Position
    this.x = renderer.width * 0.45;
    this.y = renderer.groundY;
    this.targetX = this.x;
    this.direction = 1; // 1 = right, -1 = left
    this.speed = 0;
    this.moveProgress = 1;

    // Scale (responsive)
    this.scale = Math.min(renderer.width, renderer.height) / 700;
    this.baseScale = this.scale;

    // Body proportions
    this.headRadius = 22;
    this.torsoHeight = 45;
    this.torsoWidth = 28;

    // Limbs (IK)
    this.leftArm = new Limb(25, 25);
    this.rightArm = new Limb(25, 25);
    this.leftLeg = new Limb(28, 28);
    this.rightLeg = new Limb(28, 28);

    // Animation state
    this.breathPhase = 0;
    this.walkPhase = 0;
    this.blinkTimer = 0;
    this.blinkDuration = 0.15;
    this.isBlinking = false;
    this.nextBlink = 2 + Math.random() * 4;

    // Look direction
    this.lookX = 0;
    this.lookY = 0;
    this.targetLookX = 0;
    this.targetLookY = 0;

    // Emotion
    this.eyebrowRaise = 0;
    this.mouthCurve = 0.3; // smile
    this.surprise = 0;

    // Color palette
    this.skinColor = '#f0c8a0';
    this.skinShadow = '#d4a878';
    this.hairColor = '#4a3728';
    this.shirtColor = '#5b8dd9';
    this.shirtShadow = '#4a7ac0';
    this.pantsColor = '#3a3a5a';
    this.shoeColor = '#2a2a3a';

    // Typing anim
    this.typingPhase = 0;

    // Thinking anim
    this.thinkingPhase = 0;

    // Wave anim
    this.wavePhase = 0;

    // Startled
    this.startleAmount = 0;

    // Shadow
    this.shadowWidth = 30;
  }

  updateScale() {
    this.scale = Math.min(this.r.width, this.r.height) / 700;
  }

  draw(ctx, time, dt, state, animData) {
    this.updateScale();
    const s = this.scale;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(s, s);

    // Shadow
    ctx.save();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#000';
    const shadowScale = 1 + this.startleAmount * 0.2;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.shadowWidth * shadowScale, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Animation phases
    this.breathPhase += dt * 2.5;
    const breathOffset = Math.sin(this.breathPhase) * 1.5;
    const breathScale = 1 + Math.sin(this.breathPhase) * 0.008;

    // Blink
    this.blinkTimer += dt;
    if (this.blinkTimer >= this.nextBlink) {
      this.isBlinking = true;
      if (this.blinkTimer >= this.nextBlink + this.blinkDuration) {
        this.isBlinking = false;
        this.blinkTimer = 0;
        this.nextBlink = 2 + Math.random() * 4;
      }
    }

    // Smoothly interpolate look direction
    this.lookX = lerp(this.lookX, this.targetLookX, dt * 8);
    this.lookY = lerp(this.lookY, this.targetLookY, dt * 8);

    // Startle decay
    this.startleAmount = lerp(this.startleAmount, 0, dt * 5);

    // Walk animation
    let walkCycle = 0;
    let armSwing = 0;
    let headBob = 0;
    let bodyLean = 0;

    if (state === 'WALKING') {
      this.walkPhase += dt * 8;
      walkCycle = this.walkPhase;
      armSwing = Math.sin(walkCycle) * 0.6;
      headBob = Math.abs(Math.sin(walkCycle)) * 3;
      bodyLean = Math.sin(walkCycle) * 2;
    }

    // Typing
    let typingArmAngle = 0;
    if (state === 'WORKING') {
      this.typingPhase += dt * 10;
      typingArmAngle = Math.sin(this.typingPhase) * 0.2;
    }

    // Thinking
    let thinkArmRaise = 0;
    let headTilt = 0;
    if (state === 'THINKING') {
      this.thinkingPhase += dt * 2;
      thinkArmRaise = 0.5 + Math.sin(this.thinkingPhase * 1.5) * 0.1;
      headTilt = Math.sin(this.thinkingPhase * 0.8) * 0.08;
    }

    // Waving
    let waveArmAngle = 0;
    if (state === 'WAVING') {
      this.wavePhase += dt * 8;
      waveArmAngle = -1.2 + Math.sin(this.wavePhase) * 0.4;
    }

    const startleJump = -this.startleAmount * 15;

    // ---- DRAW CHARACTER (back to front) ----

    // -- Legs --
    const hipX = 0;
    const hipY = -this.torsoHeight + breathOffset + startleJump;

    const leftFootTarget = {
      x: -10 + (state === 'WALKING' ? Math.sin(walkCycle) * 18 : 0),
      y: 0
    };
    const rightFootTarget = {
      x: 10 + (state === 'WALKING' ? Math.sin(walkCycle + Math.PI) * 18 : 0),
      y: 0
    };

    if (state === 'WALKING') {
      leftFootTarget.y = -Math.max(0, Math.sin(walkCycle)) * 12;
      rightFootTarget.y = -Math.max(0, Math.sin(walkCycle + Math.PI)) * 12;
    }

    this.leftLeg.solve(hipX - 7, hipY + this.torsoHeight * 0.95, leftFootTarget.x, leftFootTarget.y, -1);
    this.rightLeg.solve(hipX + 7, hipY + this.torsoHeight * 0.95, rightFootTarget.x, rightFootTarget.y, -1);

    // Draw back leg
    this.drawLeg(ctx, this.direction < 0 ? this.rightLeg : this.leftLeg, true);

    // -- Torso --
    ctx.save();
    ctx.translate(bodyLean, startleJump);

    // Torso
    const torsoTop = hipY + breathOffset * 0.5;
    const torsoBottom = hipY + this.torsoHeight * 0.95;

    ctx.fillStyle = this.shirtColor;
    ctx.beginPath();
    ctx.moveTo(-this.torsoWidth / 2 + 2, torsoBottom);
    ctx.bezierCurveTo(
      -this.torsoWidth / 2 - 2, torsoTop + this.torsoHeight * 0.3,
      -this.torsoWidth / 2 + 4, torsoTop,
      -6, torsoTop
    );
    ctx.lineTo(6, torsoTop);
    ctx.bezierCurveTo(
      this.torsoWidth / 2 - 4, torsoTop,
      this.torsoWidth / 2 + 2, torsoTop + this.torsoHeight * 0.3,
      this.torsoWidth / 2 - 2, torsoBottom
    );
    ctx.closePath();
    ctx.fill();

    // Shirt shadow
    ctx.fillStyle = this.shirtShadow;
    ctx.beginPath();
    ctx.moveTo(-this.torsoWidth / 2 + 4, torsoBottom);
    ctx.quadraticCurveTo(0, torsoBottom - 10, this.torsoWidth / 2 - 4, torsoBottom);
    ctx.lineTo(this.torsoWidth / 2 - 2, torsoBottom);
    ctx.lineTo(-this.torsoWidth / 2 + 2, torsoBottom);
    ctx.closePath();
    ctx.fill();

    // Collar
    ctx.strokeStyle = this.shirtShadow;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-6, torsoTop + 2);
    ctx.quadraticCurveTo(0, torsoTop + 8, 6, torsoTop + 2);
    ctx.stroke();

    ctx.restore();

    // -- Arms --
    const shoulderY = hipY + breathOffset * 0.5 + 4 + startleJump;
    const shoulderLX = -this.torsoWidth / 2 + 3 + bodyLean;
    const shoulderRX = this.torsoWidth / 2 - 3 + bodyLean;

    // Arm targets
    let leftHandTarget = { x: shoulderLX - 12, y: shoulderY + 48 };
    let rightHandTarget = { x: shoulderRX + 12, y: shoulderY + 48 };

    if (state === 'WALKING') {
      leftHandTarget.x += Math.sin(walkCycle + Math.PI) * 15;
      leftHandTarget.y += Math.cos(walkCycle + Math.PI) * 5;
      rightHandTarget.x += Math.sin(walkCycle) * 15;
      rightHandTarget.y += Math.cos(walkCycle) * 5;
    } else if (state === 'WORKING') {
      // Both hands forward typing
      const deskOffset = this.direction * 20;
      leftHandTarget = { x: deskOffset - 10 + Math.sin(this.typingPhase) * 5, y: shoulderY + 38 + Math.sin(this.typingPhase * 1.3) * 3 };
      rightHandTarget = { x: deskOffset + 10 + Math.sin(this.typingPhase + 2) * 5, y: shoulderY + 38 + Math.sin(this.typingPhase * 1.3 + 1) * 3 };
    } else if (state === 'THINKING') {
      // One hand on chin
      rightHandTarget = {
        x: this.direction * 8,
        y: hipY - 12 + Math.sin(this.thinkingPhase) * 2
      };
    } else if (state === 'WAVING') {
      rightHandTarget = {
        x: shoulderRX + 25,
        y: shoulderY - 35 + Math.sin(this.wavePhase) * 8
      };
    } else if (state === 'REACTING_TO_CURSOR') {
      // Slightly raised hands
      leftHandTarget.y -= 8;
      rightHandTarget.y -= 8;
    }

    // Back arm
    const backArm = this.direction > 0 ? this.leftArm : this.rightArm;
    const backShX = this.direction > 0 ? shoulderLX : shoulderRX;
    const backTarget = this.direction > 0 ? leftHandTarget : rightHandTarget;
    backArm.solve(backShX, shoulderY, backTarget.x, backTarget.y, this.direction > 0 ? 1 : -1);
    this.drawArm(ctx, backArm, true);

    // Front leg
    this.drawLeg(ctx, this.direction < 0 ? this.leftLeg : this.rightLeg, false);

    // Front arm
    const frontArm = this.direction > 0 ? this.rightArm : this.leftArm;
    const frontShX = this.direction > 0 ? shoulderRX : shoulderLX;
    const frontTarget = this.direction > 0 ? rightHandTarget : leftHandTarget;
    frontArm.solve(frontShX, shoulderY, frontTarget.x, frontTarget.y, this.direction > 0 ? -1 : 1);
    this.drawArm(ctx, frontArm, false);

    // -- Head --
    const headY = hipY - this.headRadius + breathOffset * 0.3 - headBob + startleJump;
    const headX = bodyLean * 0.5;

    ctx.save();
    ctx.translate(headX, headY);
    ctx.rotate(headTilt);

    // Neck
    ctx.fillStyle = this.skinColor;
    ctx.fillRect(-4, this.headRadius * 0.6, 8, 10);

    // Head shape (oval with bezier)
    ctx.fillStyle = this.skinColor;
    ctx.beginPath();
    const hr = this.headRadius;
    const squash = 1 + this.surprise * 0.1;
    ctx.save();
    ctx.scale(1, squash);
    ctx.arc(0, 0, hr, 0, Math.PI * 2);
    ctx.restore();
    ctx.fill();

    // Ear
    ctx.fillStyle = this.skinShadow;
    const earSide = this.direction;
    ctx.beginPath();
    ctx.ellipse(earSide * hr * 0.9, 2, 5, 7, earSide * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = this.skinColor;
    ctx.beginPath();
    ctx.ellipse(earSide * hr * 0.85, 2, 3, 5, earSide * 0.2, 0, Math.PI * 2);
    ctx.fill();

    // Hair
    ctx.fillStyle = this.hairColor;
    ctx.beginPath();
    ctx.arc(0, -2, hr + 1, -Math.PI, 0);
    ctx.bezierCurveTo(hr + 3, -hr * 0.3, hr * 0.5, -hr - 8, 0, -hr - 5);
    ctx.bezierCurveTo(-hr * 0.5, -hr - 8, -hr - 3, -hr * 0.3, -hr - 1, 0);
    ctx.closePath();
    ctx.fill();

    // Hair fringe
    ctx.beginPath();
    ctx.moveTo(-hr * 0.7, -hr * 0.7);
    ctx.bezierCurveTo(-hr * 0.3, -hr * 0.5 - 6, hr * 0.1, -hr * 0.6, hr * 0.5, -hr * 0.75);
    ctx.bezierCurveTo(hr * 0.3, -hr * 0.55, -hr * 0.1, -hr * 0.4 - 2, -hr * 0.5, -hr * 0.5);
    ctx.closePath();
    ctx.fill();

    // Eyes
    const eyeSpacing = 8;
    const eyeY = -1 + this.lookY * 2;
    const eyeOffsetX = this.lookX * 3;

    for (let side = -1; side <= 1; side += 2) {
      const ex = side * eyeSpacing + eyeOffsetX;

      if (this.isBlinking) {
        // Blink - closed eye line
        ctx.strokeStyle = '#2a2a3a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ex - 5, eyeY);
        ctx.lineTo(ex + 5, eyeY);
        ctx.stroke();
      } else {
        // Eye white
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        const eyeW = 6 + this.surprise * 2;
        const eyeH = 6.5 + this.surprise * 3;
        ctx.ellipse(ex, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2);
        ctx.fill();

        // Iris
        ctx.fillStyle = '#4a6a8a';
        const irisOff = this.lookX * 2;
        ctx.beginPath();
        ctx.arc(ex + irisOff, eyeY + this.lookY * 1.5, 3.5, 0, Math.PI * 2);
        ctx.fill();

        // Pupil
        ctx.fillStyle = '#1a1a2a';
        ctx.beginPath();
        ctx.arc(ex + irisOff, eyeY + this.lookY * 1.5, 1.8, 0, Math.PI * 2);
        ctx.fill();

        // Eye highlight
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        ctx.arc(ex + irisOff + 1.5, eyeY + this.lookY - 1.5, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Eyebrow
      ctx.strokeStyle = this.hairColor;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      const browY = eyeY - 10 - this.eyebrowRaise * 3 - this.surprise * 4;
      ctx.beginPath();
      ctx.moveTo(ex - 6, browY + (side === -1 ? this.eyebrowRaise : 0));
      ctx.quadraticCurveTo(ex, browY - 2, ex + 6, browY + (side === 1 ? this.eyebrowRaise : 0));
      ctx.stroke();
    }

    // Nose
    ctx.strokeStyle = this.skinShadow;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(eyeOffsetX, 3);
    ctx.quadraticCurveTo(eyeOffsetX + 3, 7, eyeOffsetX, 8);
    ctx.stroke();

    // Mouth
    ctx.strokeStyle = '#8a5a4a';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    const mouthY = 13;
    const mouthW = 6;
    const mouthCurve = this.mouthCurve * 4;

    if (state === 'WAVING') {
      // Open smile
      ctx.fillStyle = '#6a3a3a';
      ctx.beginPath();
      ctx.moveTo(eyeOffsetX - mouthW, mouthY);
      ctx.quadraticCurveTo(eyeOffsetX, mouthY + 6, eyeOffsetX + mouthW, mouthY);
      ctx.quadraticCurveTo(eyeOffsetX, mouthY + 2, eyeOffsetX - mouthW, mouthY);
      ctx.fill();
    } else if (this.surprise > 0.3) {
      // Surprised O mouth
      ctx.fillStyle = '#6a3a3a';
      ctx.beginPath();
      ctx.ellipse(eyeOffsetX, mouthY + 2, 4 * this.surprise, 5 * this.surprise, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(eyeOffsetX - mouthW, mouthY);
      ctx.quadraticCurveTo(eyeOffsetX, mouthY + mouthCurve, eyeOffsetX + mouthW, mouthY);
      ctx.stroke();
    }

    // Cheek blush (when reacting)
    if (state === 'REACTING_TO_CURSOR' || state === 'WAVING') {
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#ff8888';
      ctx.beginPath();
      ctx.ellipse(-12, 6, 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(12, 6, 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Thinking state - thought bubbles
    if (state === 'THINKING') {
      ctx.globalAlpha = 0.5 + Math.sin(this.thinkingPhase * 2) * 0.3;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      const bubbleDir = this.direction;
      ctx.beginPath();
      ctx.arc(bubbleDir * 25, -hr - 10, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bubbleDir * 32, -hr - 22, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bubbleDir * 36, -hr - 38, 9, 0, Math.PI * 2);
      ctx.fill();
      // Question mark or lightbulb
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      const symbols = ['?', '!', '💡', '...'];
      const symIdx = Math.floor(this.thinkingPhase * 0.3) % symbols.length;
      ctx.fillText(symbols[symIdx], bubbleDir * 36, -hr - 34);
      ctx.globalAlpha = 1;
    }

    ctx.restore(); // head transform

    // -- Pants waistline --
    ctx.save();
    ctx.translate(bodyLean, startleJump);
    ctx.fillStyle = this.pantsColor;
    ctx.beginPath();
    const waistY = hipY + this.torsoHeight * 0.85;
    ctx.ellipse(0, waistY, this.torsoWidth / 2 - 1, 5, 0, 0, Math.PI);
    ctx.fill();
    ctx.restore();

    ctx.restore(); // main transform
  }

  drawArm(ctx, arm, isBack) {
    ctx.save();
    if (isBack) ctx.globalAlpha = 0.85;

    const thickness = isBack ? 5 : 6;

    // Upper arm (skin-colored sleeve end)
    ctx.strokeStyle = this.shirtColor;
    ctx.lineWidth = thickness + 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(arm.jointX - (arm.jointX - (arm.angle1 !== undefined ? arm.jointX : 0)) * 0.01, arm.jointY - (arm.jointY - arm.jointY) * 0.01);

    // Get the start from the IK solver - approximate
    const startX = arm.jointX - Math.cos(arm.angle1) * arm.length1;
    const startY = arm.jointY - Math.sin(arm.angle1) * arm.length1;

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(
      arm.jointX + (arm.jointX - startX) * 0.1,
      arm.jointY + 2,
      arm.jointX,
      arm.jointY
    );
    ctx.stroke();

    // Forearm (skin)
    ctx.strokeStyle = this.skinColor;
    ctx.lineWidth = thickness;
    ctx.beginPath();
    ctx.moveTo(arm.jointX, arm.jointY);
    ctx.quadraticCurveTo(
      (arm.jointX + arm.endX) / 2 + 2,
      (arm.jointY + arm.endY) / 2 + 3,
      arm.endX,
      arm.endY
    );
    ctx.stroke();

    // Hand
    ctx.fillStyle = this.skinColor;
    ctx.beginPath();
    ctx.arc(arm.endX, arm.endY, isBack ? 3.5 : 4, 0, Math.PI * 2);
    ctx.fill();

    // Joint circle
    ctx.fillStyle = isBack ? this.shirtShadow : this.shirtColor;
    ctx.beginPath();
    ctx.arc(arm.jointX, arm.jointY, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  drawLeg(ctx, leg, isBack) {
    ctx.save();
    if (isBack) ctx.globalAlpha = 0.8;

    const thickness = isBack ? 6 : 7;

    const startX = leg.jointX - Math.cos(leg.angle1) * leg.length1;
    const startY = leg.jointY - Math.sin(leg.angle1) * leg.length1;

    // Upper leg (pants)
    ctx.strokeStyle = this.pantsColor;
    ctx.lineWidth = thickness + 1;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(
      leg.jointX + 1,
      leg.jointY,
      leg.jointX,
      leg.jointY
    );
    ctx.stroke();

    // Lower leg
    ctx.strokeStyle = this.pantsColor;
    ctx.lineWidth = thickness;
    ctx.beginPath();
    ctx.moveTo(leg.jointX, leg.jointY);
    ctx.quadraticCurveTo(
      (leg.jointX + leg.endX) / 2 - 1,
      (leg.jointY + leg.endY) / 2,
      leg.endX,
      leg.endY
    );
    ctx.stroke();

    // Shoe
    ctx.fillStyle = this.shoeColor;
    ctx.beginPath();
    const shoeDir = leg.endX > startX ? 1 : -1;
    ctx.ellipse(leg.endX + shoeDir * 4, leg.endY, 9, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Knee
    ctx.fillStyle = this.pantsColor;
    ctx.beginPath();
    ctx.arc(leg.jointX, leg.jointY, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// ============================================================
// 4. AI BRAIN - FINITE STATE MACHINE
// ============================================================
const STATES = {
  IDLE: 'IDLE',
  WALKING: 'WALKING',
  WORKING: 'WORKING',
  THINKING: 'THINKING',
  REACTING_TO_CURSOR: 'REACTING_TO_CURSOR',
  WAVING: 'WAVING'
};

class Brain {
  constructor(character, room) {
    this.char = character;
    this.room = room;
    this.state = STATES.IDLE;
    this.stateTimer = 0;
    this.stateDuration = 3;
    this.prevState = STATES.IDLE;

    // Movement
    this.moveStartX = character.x;
    this.moveEndX = character.x;
    this.moveProgress = 1;
    this.moveDuration = 2;

    // Destination labels for display
    this.currentPosition = 'center';
    this.targetPosition = 'center';

    // Cursor interaction
    this.cursorNearTimer = 0;
    this.cursorWasNear = false;
    this.lastCursorDist = Infinity;
    this.cursorSpeed = 0;

    // Schedule
    this.taskQueue = [];
    this.idleTime = 0;
  }

  update(dt, mouseX, mouseY, mouseClicked, mouseSpeed) {
    this.stateTimer += dt;
    this.cursorSpeed = mouseSpeed;

    // Calculate cursor distance to character
    const cx = this.char.x;
    const cy = this.char.y - 60 * this.char.scale;
    const cursorDist = dist(cx, cy, mouseX, mouseY);
    const nearThreshold = 150;
    const cursorNear = cursorDist < nearThreshold;

    // Look at cursor when near
    if (cursorNear) {
      const dx = (mouseX - cx) / (nearThreshold);
      const dy = (mouseY - cy) / (nearThreshold);
      this.char.targetLookX = clamp(dx, -1, 1);
      this.char.targetLookY = clamp(dy, -1, 1);
      this.cursorNearTimer += dt;
    } else {
      this.cursorNearTimer = Math.max(0, this.cursorNearTimer - dt * 0.5);
      // Default look based on state
      if (this.state === STATES.WORKING) {
        this.char.targetLookX = this.char.direction * 0.3;
        this.char.targetLookY = 0.2;
      } else if (this.state === STATES.THINKING) {
        this.char.targetLookX = 0;
        this.char.targetLookY = -0.5;
      } else if (this.state === STATES.WALKING) {
        this.char.targetLookX = this.char.direction * 0.5;
        this.char.targetLookY = 0;
      } else {
        this.char.targetLookX = lerp(this.char.targetLookX, 0, dt * 0.5);
        this.char.targetLookY = lerp(this.char.targetLookY, 0, dt * 0.5);
      }
    }

    // Mouse click reaction
    if (mouseClicked && cursorDist < 200) {
      this.enterState(STATES.WAVING);
      this.char.mouthCurve = 0.8;
      this.char.eyebrowRaise = 2;
      return;
    }

    // Fast mouse movement = startle
    if (mouseSpeed > 1500 && cursorNear && this.state !== STATES.WAVING) {
      this.char.startleAmount = 1;
      this.char.surprise = 1;
      this.char.eyebrowRaise = 3;
    }

    // State machine transitions
    switch (this.state) {
      case STATES.IDLE:
        this.char.mouthCurve = lerp(this.char.mouthCurve, 0.3, dt * 2);
        this.char.eyebrowRaise = lerp(this.char.eyebrowRaise, 0, dt * 3);
        this.char.surprise = lerp(this.char.surprise, 0, dt * 3);
        this.idleTime += dt;

        if (cursorNear && this.cursorNearTimer > 1.5) {
          this.enterState(STATES.REACTING_TO_CURSOR);
        } else if (this.stateTimer > this.stateDuration) {
          this.pickNextTask();
        }
        break;

      case STATES.WALKING:
        this.updateMovement(dt);
        this.char.surprise = lerp(this.char.surprise, 0, dt * 3);
        if (this.moveProgress >= 1) {
          // Arrived at destination
          if (this.targetPosition === 'desk') {
            this.enterState(STATES.WORKING);
          } else if (this.targetPosition === 'window') {
            this.enterState(STATES.THINKING);
          } else {
            this.enterState(STATES.IDLE);
          }
        }
        break;

      case STATES.WORKING:
        this.char.mouthCurve = lerp(this.char.mouthCurve, 0.1, dt);
        this.char.eyebrowRaise = lerp(this.char.eyebrowRaise, 0.5, dt);
        this.char.surprise = lerp(this.char.surprise, 0, dt * 3);
        if (cursorNear && this.cursorNearTimer > 2) {
          this.enterState(STATES.REACTING_TO_CURSOR);
        } else if (this.stateTimer > this.stateDuration) {
          this.pickNextTask();
        }
        break;

      case STATES.THINKING:
        this.char.mouthCurve = lerp(this.char.mouthCurve, 0, dt);
        this.char.eyebrowRaise = lerp(this.char.eyebrowRaise, 1.5, dt);
        this.char.surprise = lerp(this.char.surprise, 0, dt * 3);
        if (this.stateTimer > this.stateDuration) {
          this.pickNextTask();
        }
        break;

      case STATES.REACTING_TO_CURSOR:
        this.char.mouthCurve = lerp(this.char.mouthCurve, 0.5, dt * 3);
        this.char.eyebrowRaise = lerp(this.char.eyebrowRaise, 1.5, dt * 3);
        this.char.surprise = lerp(this.char.surprise, 0.3, dt * 3);
        if (!cursorNear || this.stateTimer > 4) {
          this.enterState(STATES.IDLE);
          this.stateDuration = 1;
        }
        break;

      case STATES.WAVING:
        this.char.mouthCurve = lerp(this.char.mouthCurve, 1, dt * 4);
        this.char.surprise = lerp(this.char.surprise, 0, dt * 2);
        if (this.stateTimer > 2.5) {
          this.enterState(STATES.IDLE);
        }
        break;
    }

    this.lastCursorDist = cursorDist;

    // Update UI
    document.getElementById('state-display').textContent = `State: ${this.state}`;
    const moods = {
      IDLE: '😌 Relaxed',
      WALKING: '🚶 On the move',
      WORKING: '💻 Focused',
      THINKING: '🤔 Deep in thought',
      REACTING_TO_CURSOR: '👀 Curious',
      WAVING: '👋 Friendly'
    };
    document.getElementById('mood-text').textContent = `Mood: ${moods[this.state] || 'Content'}`;
  }

  enterState(newState) {
    this.prevState = this.state;
    this.state = newState;
    this.stateTimer = 0;

    switch (newState) {
      case STATES.IDLE:
        this.stateDuration = randRange(2, 5);
        this.idleTime = 0;
        break;
      case STATES.WALKING:
        this.stateDuration = 999; // controlled by movement
        break;
      case STATES.WORKING:
        this.stateDuration = randRange(5, 10);
        this.char.direction = 1;
        break;
      case STATES.THINKING:
        this.stateDuration = randRange(3, 7);
        break;
      case STATES.REACTING_TO_CURSOR:
        this.stateDuration = 4;
        break;
      case STATES.WAVING:
        this.stateDuration = 2.5;
        this.char.wavePhase = 0;
        break;
    }
  }

  pickNextTask() {
    const positions = Object.keys(this.room.positions);
    const tasks = [
      { pos: 'desk', state: STATES.WORKING, weight: 3 },
      { pos: 'window', state: STATES.THINKING, weight: 2 },
      { pos: 'center', state: STATES.IDLE, weight: 2 },
      { pos: 'plant', state: STATES.IDLE, weight: 1 },
      { pos: 'doorway', state: STATES.IDLE, weight: 1 }
    ];

    // Filter out current position
    const available = tasks.filter(t => t.pos !== this.currentPosition);

    // Weighted random
    const totalWeight = available.reduce((sum, t) => sum + t.weight, 0);
    let r = Math.random() * totalWeight;
    let chosen = available[0];
    for (const t of available) {
      r -= t.weight;
      if (r <= 0) { chosen = t; break; }
    }

    this.walkTo(chosen.pos);
  }

  walkTo(posName) {
    this.targetPosition = posName;
    this.moveStartX = this.char.x;
    this.moveEndX = this.room.getWorldX(posName);
    this.moveProgress = 0;

    const distance = Math.abs(this.moveEndX - this.moveStartX);
    this.moveDuration = distance / 120; // pixels per second = 120
    this.moveDuration = Math.max(this.moveDuration, 0.5);

    // Set direction
    this.char.direction = this.moveEndX > this.moveStartX ? 1 : -1;
    this.enterState(STATES.WALKING);
  }

  updateMovement(dt) {
    if (this.moveProgress < 1) {
      this.moveProgress += dt / this.moveDuration;
      this.moveProgress = Math.min(this.moveProgress, 1);

      const eased = easeInOutCubic(this.moveProgress);
      this.char.x = lerp(this.moveStartX, this.moveEndX, eased);
    }
    if (this.moveProgress >= 1) {
      this.currentPosition = this.targetPosition;
    }
  }
}

// ============================================================
// 5. INTERACTION SYSTEM
// ============================================================
class InteractionSystem {
  constructor(canvas) {
    this.mouseX = 0;
    this.mouseY = 0;
    this.prevMouseX = 0;
    this.prevMouseY = 0;
    this.mouseSpeed = 0;
    this.mouseClicked = false;
    this.clickParticles = [];

    canvas.addEventListener('mousemove', (e) => {
      this.prevMouseX = this.mouseX;
      this.prevMouseY = this.mouseY;
      this.mouseX = e.clientX;
      this.mouseY = e.clientY;
    });

    canvas.addEventListener('click', (e) => {
      this.mouseClicked = true;
      // Spawn particles
      for (let i = 0; i < 8; i++) {
        this.clickParticles.push({
          x: e.clientX, y: e.clientY,
          vx: (Math.random() - 0.5) * 200,
          vy: (Math.random() - 0.5) * 200 - 50,
          life: 1,
          size: randRange(3, 8),
          color: `hsl(${randRange(180, 280)}, 70%, 65%)`
        });
      }
    });

    canvas.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      this.mouseX = t.clientX;
      this.mouseY = t.clientY;
      this.mouseClicked = true;
    });

    canvas.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      this.prevMouseX = this.mouseX;
      this.prevMouseY = this.mouseY;
      this.mouseX = t.clientX;
      this.mouseY = t.clientY;
    });
  }

  update(dt) {
    // Calculate mouse speed
    const dx = this.mouseX - this.prevMouseX;
    const dy = this.mouseY - this.prevMouseY;
    const instantSpeed = Math.hypot(dx, dy) / Math.max(dt, 0.001);
    this.mouseSpeed = lerp(this.mouseSpeed, instantSpeed, dt * 10);

    // Update particles
    for (let i = this.clickParticles.length - 1; i >= 0; i--) {
      const p = this.clickParticles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt; // gravity
      p.life -= dt * 2;
      if (p.life <= 0) this.clickParticles.splice(i, 1);
    }
  }

  drawParticles(ctx) {
    for (const p of this.clickParticles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  consumeClick() {
    const clicked = this.mouseClicked;
    this.mouseClicked = false;
    return clicked;
  }
}

// ============================================================
// 6. PARTICLE / FX SYSTEM
// ============================================================
class FXSystem {
  constructor() {
    this.ambientParticles = [];
    // Floating dust motes
    for (let i = 0; i < 20; i++) {
      this.ambientParticles.push({
        x: Math.random(),
        y: Math.random(),
        size: randRange(1, 3),
        speedX: randRange(-0.02, 0.02),
        speedY: randRange(-0.01, -0.03),
        opacity: randRange(0.05, 0.15),
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  update(dt) {
    for (const p of this.ambientParticles) {
      p.x += p.speedX * dt;
      p.y += p.speedY * dt;
      p.phase += dt * 2;
      if (p.y < -0.05) { p.y = 1.05; p.x = Math.random(); }
      if (p.x < -0.05) p.x = 1.05;
      if (p.x > 1.05) p.x = -0.05;
    }
  }

  draw(ctx, W, H, time) {
    for (const p of this.ambientParticles) {
      const drift = Math.sin(p.phase) * 5;
      ctx.globalAlpha = p.opacity * (0.5 + 0.5 * Math.sin(p.phase * 0.5));
      ctx.fillStyle = '#aabbdd';
      ctx.beginPath();
      ctx.arc(p.x * W + drift, p.y * H, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// MAIN APPLICATION
// ============================================================
class App {
  constructor() {
    this.renderer = new RenderingEngine();
    this.room = new Room(this.renderer);
    this.character = new Character(this.renderer);
    this.brain = new Brain(this.character, this.room);
    this.interaction = new InteractionSystem(this.renderer.canvas);
    this.fx = new FXSystem();

    this.lastTime = 0;
    this.running = true;

    // Start the loop
    requestAnimationFrame((t) => this.loop(t));
  }

  loop(timestamp) {
    if (!this.running) return;

    const dt = Math.min((timestamp - this.lastTime) / 1000, 0.05); // cap dt
    this.lastTime = timestamp;

    // Update
    this.interaction.update(dt);
    const clicked = this.interaction.consumeClick();
    this.brain.update(dt, this.interaction.mouseX, this.interaction.mouseY, clicked, this.interaction.mouseSpeed);
    this.fx.update(dt);

    // Render
    this.renderer.clear();
    this.renderer.updateFPS(timestamp);

    const ctx = this.renderer.ctx;

    // Layer 1: Room background
    this.room.draw(timestamp);

    // Layer 2: Character
    this.character.draw(ctx, timestamp, dt, this.brain.state, {});

    // Layer 3: Ambient FX
    this.fx.draw(ctx, this.renderer.width, this.renderer.height, timestamp);

    // Layer 4: Interaction FX
    this.interaction.drawParticles(ctx);

    // Draw cursor proximity indicator
    this.drawCursorFX(ctx);

    requestAnimationFrame((t) => this.loop(t));
  }

  drawCursorFX(ctx) {
    const cx = this.character.x;
    const cy = this.character.y - 60 * this.character.scale;
    const d = dist(cx, cy, this.interaction.mouseX, this.interaction.mouseY);

    if (d < 200) {
      const alpha = smoothstep(200, 50, d) * 0.15;
      ctx.strokeStyle = `rgba(130, 180, 255, ${alpha})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(this.interaction.mouseX, this.interaction.mouseY);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  new App();
});
</script>
